<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Pages Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            color: #24292e; /* GitHub-style dark grey */
        }
        .btn {
            display: inline-block;
            background-color: #2ea44f; /* Green button */
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <h1>Hello, World! 🚀</h1>
    <p>Welcome to my brand new website, hosted for free on GitHub Pages.</p>
    <p>This is a simple, single-page site that you can easily customize to showcase your portfolio, projects, or resume.</p>
    
    <a href="https://github.com" class="btn" target="_blank">Visit my GitHub</a>

</body>
</html>
